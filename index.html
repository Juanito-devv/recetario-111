    <style>
        /* Estilos pensados para máxima legibilidad y facilidad de uso */
        :root {
            --color-fondo: #f9f9f9;
            --color-texto: #333333;
            --color-primario: #4CAF50;
            --color-tarjeta: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            font-size: 18px; /* Letra grande por defecto */
        }

        header {
            background-color: var(--color-primario);
            color: white;
            text-align: center;
            padding: 20px 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 28px; }

        .buscador-contenedor {
            padding: 20px;
            text-align: center;
        }

        #buscador {
            width: 90%;
            max-width: 400px;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 25px;
            outline: none;
        }

        #buscador:focus { border-color: var(--color-primario); }

        .lista-recetas {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px 20px;
            padding-bottom: 40px;
        }

        .tarjeta-receta {
            background-color: var(--color-tarjeta);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            border: 2px solid transparent;
        }

        .tarjeta-receta:active { border-color: var(--color-primario); }

        /* Pantalla de la receta completa */
        #vista-receta {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--color-fondo);
            overflow-y: auto;
            z-index: 1000;
        }

        .btn-volver {
            background-color: var(--color-primario);
            color: white;
            width: 100%;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            position: sticky;
            top: 0;
        }

        .contenido-receta { padding: 20px; }
        
        .contenido-receta h2 { font-size: 26px; color: var(--color-primario); }
        .contenido-receta h3 { font-size: 22px; margin-top: 25px; border-bottom: 2px solid #ddd; padding-bottom: 5px;}
        .contenido-receta ul, .contenido-receta ol { padding-left: 20px; font-size: 20px; line-height: 1.6; }
        .contenido-receta li { margin-bottom: 15px; }

    </style>
</head>

        // Función para mostrar la lista en pantalla
        function mostrarLista(filtro = "") {
            const contenedor = document.getElementById("contenedor-recetas");
            contenedor.innerHTML = ""; // Limpiar lista

            const recetasFiltradas = recetas.filter(receta => 
                receta.titulo.toLowerCase().includes(filtro.toLowerCase())
            );

            recetasFiltradas.forEach((receta, index) => {
                const div = document.createElement("div");
                div.className = "tarjeta-receta";
                div.textContent = receta.titulo;
                // Al hacer clic, abrimos la receta (pasamos el objeto receta original)
                div.onclick = () => abrirReceta(receta);
                contenedor.appendChild(div);
            });
        }

        // Función que se ejecuta al escribir en el buscador
        function filtrarRecetas() {
            const texto = document.getElementById("buscador").value;
            mostrarLista(texto);
        }

        // Función para ver los detalles de una receta
        function abrirReceta(receta) {
            const detalle = document.getElementById("detalle-receta");
            
            // Construimos el HTML interno de los ingredientes
            let htmlIngredientes = "<ul>";
            receta.ingredientes.forEach(ing => { htmlIngredientes += `<li>${ing}</li>`; });
            htmlIngredientes += "</ul>";

            // Construimos el HTML interno de los pasos
            let htmlPreparacion = "<ol>";
            receta.preparacion.forEach(paso => { htmlPreparacion += `<li>${paso}</li>`; });
            htmlPreparacion += "</ol>";

            // Pegamos todo en la pantalla
            detalle.innerHTML = `
                <h2>${receta.titulo}</h2>
                <h3>Ingredientes</h3>
                ${htmlIngredientes}
                <h3>Preparación</h3>
                ${htmlPreparacion}
            `;

            // Ocultamos el menú y mostramos la receta
            document.getElementById("pantalla-principal").style.display = "none";
            document.getElementById("vista-receta").style.display = "block";
            // Llevamos la vista hacia arriba
            document.getElementById("vista-receta").scrollTo(0, 0);
        }

        // Función para regresar al menú
        function cerrarReceta() {
            document.getElementById("vista-receta").style.display = "none";
            document.getElementById("pantalla-principal").style.display = "block";
        }

        // Mostrar todo al cargar la página
        mostrarLista();
    </script>
</body>
</html>
